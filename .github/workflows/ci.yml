name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUTF8: "1"
  QT_QPA_PLATFORM: offscreen
  MPLCONFIGDIR: .cache/matplotlib
  XDG_CACHE_HOME: .cache/xdg

jobs:
  manual-install:
    name: Manual install (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            setup.cfg
            pyproject.toml

      - name: Install package and test dependencies
        run: python -m pip install ".[test]"

      - name: Validate installed environment
        run: python -m pip check

      - name: Smoke-test installed package
        run: python -c "import importlib.metadata as md, os, pathlib, sysconfig; import quick_ternaries, quick_ternaries.main; script = pathlib.Path(sysconfig.get_path('scripts')) / ('quick-ternaries.exe' if os.name == 'nt' else 'quick-ternaries'); print(md.version('quick-ternaries')); assert script.exists(), script"

      - name: Run tests
        run: python -m pytest -q

  conda-install:
    name: Conda-assisted install (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    defaults:
      run:
        shell: bash -el {0}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          miniforge-version: latest
          activate-environment: quick_ternaries
          python-version: ${{ matrix.python-version }}
          channels: conda-forge
          channel-priority: strict

      - name: Install conda bootstrap dependencies
        run: conda install -y pip "requests>=2.31,<3"

      - name: Install package and test dependencies
        run: python -m pip install ".[test]"

      - name: Validate installed environment
        run: python -m pip check

      - name: Smoke-test installed package
        run: python -c "import importlib.metadata as md, os, pathlib, sysconfig; import quick_ternaries, quick_ternaries.main; script = pathlib.Path(sysconfig.get_path('scripts')) / ('quick-ternaries.exe' if os.name == 'nt' else 'quick-ternaries'); print(md.version('quick-ternaries')); assert script.exists(), script"

      - name: Run tests
        run: python -m pytest -q

  conda-environment-file:
    name: Conda launcher environment file
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          miniforge-version: latest
          channels: conda-forge
          channel-priority: strict

      - name: Create launcher environment from README-backed file
        run: conda env create -f launcher/environment.yml

      - name: Validate launcher environment
        run: conda run -n quick_ternaries python -c "import requests; import sys; assert (3, 11) <= sys.version_info[:2] < (3, 15)"

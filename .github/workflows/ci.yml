name: CI

on:
  workflow_dispatch:
    inputs:
      full_ci:
        description: Run the full install matrix
        required: false
        type: boolean
        default: true
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUTF8: "1"
  QT_QPA_PLATFORM: offscreen
  MPLCONFIGDIR: .cache/matplotlib
  XDG_CACHE_HOME: .cache/xdg

jobs:
  ci_scope:
    name: CI scope
    runs-on: ubuntu-latest
    outputs:
      run_full_ci: ${{ steps.scope.outputs.run_full_ci }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Determine CI scope
        id: scope
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BEFORE_SHA: ${{ github.event.before }}
          WORKFLOW_DISPATCH_FULL_CI: ${{ inputs.full_ci }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            base="$PR_BASE_SHA"
            head="$PR_HEAD_SHA"
          elif [[ -n "${BEFORE_SHA:-}" && "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]]; then
            base="$BEFORE_SHA"
            head="$GITHUB_SHA"
          else
            base=""
            head="$GITHUB_SHA"
          fi

          run_full_ci=false
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            run_full_ci="${WORKFLOW_DISPATCH_FULL_CI:-true}"
            changed_files="manual workflow dispatch"
          else
            if [[ -z "$base" ]] || ! git cat-file -e "$base^{commit}" || ! git cat-file -e "$head^{commit}"; then
              run_full_ci=true
              changed_files="unknown"
            else
              changed_files="$(git diff --name-only "$base" "$head")"
              if [[ -z "$changed_files" ]]; then
                run_full_ci=true
              else
                while IFS= read -r file; do
                  case "$file" in
                    README.md|CITATION.cff|*.md|docs/*|docs/**|img/*|img/**)
                      ;;
                    *)
                      run_full_ci=true
                      ;;
                  esac
                done <<< "$changed_files"
              fi

              git diff --check "$base" "$head"
            fi
          fi

          if [[ -f CITATION.cff ]]; then
            ruby -e "require 'yaml'; YAML.load_file('CITATION.cff')"
          fi

          {
            echo "run_full_ci=$run_full_ci"
            echo "changed_files<<EOF"
            printf '%s\n' "$changed_files"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### CI scope"
            echo
            echo "Full install matrix: \`$run_full_ci\`"
            echo
            echo "Changed files:"
            echo
            printf '%s\n' "$changed_files" | sed 's/^/- /'
          } >> "$GITHUB_STEP_SUMMARY"

  manual-install:
    name: Manual install (${{ matrix.os }}, Python ${{ matrix.python-version }})
    needs: ci_scope
    if: needs.ci_scope.outputs.run_full_ci == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            setup.cfg
            pyproject.toml

      - name: Install Linux Qt runtime dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libopengl0 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-xinerama0 \
            libxcb-xfixes0

      - name: Install package and test dependencies
        run: python -m pip install ".[test]"

      - name: Validate installed environment
        run: python -m pip check

      - name: Smoke-test installed package
        run: python -c "import importlib.metadata as md, os, pathlib, sysconfig; import quick_ternaries, quick_ternaries.main; script = pathlib.Path(sysconfig.get_path('scripts')) / ('quick-ternaries.exe' if os.name == 'nt' else 'quick-ternaries'); print(md.version('quick-ternaries')); assert script.exists(), script"

      - name: Run tests
        run: python -m pytest -q

  conda-install:
    name: Conda-assisted install (Python ${{ matrix.python-version }})
    needs: ci_scope
    if: needs.ci_scope.outputs.run_full_ci == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    defaults:
      run:
        shell: bash -el {0}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v4
        with:
          auto-update-conda: true
          miniforge-version: latest
          activate-environment: quick_ternaries
          python-version: ${{ matrix.python-version }}
          channels: conda-forge
          channel-priority: strict

      - name: Install conda bootstrap dependencies
        run: conda install -y pip "requests>=2.31,<3"

      - name: Install Linux Qt runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libopengl0 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-xinerama0 \
            libxcb-xfixes0

      - name: Install package and test dependencies
        run: python -m pip install ".[test]"

      - name: Validate installed environment
        run: python -m pip check

      - name: Smoke-test installed package
        run: python -c "import importlib.metadata as md, os, pathlib, sysconfig; import quick_ternaries, quick_ternaries.main; script = pathlib.Path(sysconfig.get_path('scripts')) / ('quick-ternaries.exe' if os.name == 'nt' else 'quick-ternaries'); print(md.version('quick-ternaries')); assert script.exists(), script"

      - name: Run tests
        run: python -m pytest -q

  conda-environment-file:
    name: Conda launcher environment file
    needs: ci_scope
    if: needs.ci_scope.outputs.run_full_ci == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v4
        with:
          auto-update-conda: true
          miniforge-version: latest
          channels: conda-forge
          channel-priority: strict

      - name: Create launcher environment from README-backed file
        run: conda env create -f launcher/environment.yml

      - name: Validate launcher environment
        run: conda run -n quick_ternaries python -c "import requests; import sys; assert (3, 11) <= sys.version_info[:2] < (3, 15)"
